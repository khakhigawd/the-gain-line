<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layback Analytics — Access Required</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.gate {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 50px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}
.logo {
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.logo span { color: #4CAF50; }
.tagline {
  font-size: 13px;
  color: #555;
  margin-bottom: 35px;
}
.gate-title {
  font-size: 16px;
  color: #888;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 11px;
}
input[type=password] {
  width: 100%;
  background: #1a1a1a;
  color: #fff;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 14px 16px;
  font-size: 16px;
  margin-bottom: 12px;
  text-align: center;
  letter-spacing: 4px;
}
input[type=password]:focus {
  outline: none;
  border-color: #4CAF50;
}
input[type=password]::placeholder {
  letter-spacing: 1px;
  color: #444;
}
.submit-btn {
  width: 100%;
  background: #4CAF50;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 14px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 15px;
}
.submit-btn:hover { background: #45a045; }
.error {
  color: #cc4444;
  font-size: 13px;
  margin-top: 10px;
  display: none;
}
.footer-text {
  margin-top: 30px;
  font-size: 11px;
  color: #333;
}
</style>
</head>
<body>
<div class="gate">
  <div class="logo">LAYBACK <span>ANALYTICS</span></div>
  <div class="tagline">Sports Analytics Platform</div>
  <div class="gate-title">Enter Access Code</div>
  <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPassword()">
  <button class="submit-btn" onclick="checkPassword()">ACCESS SITE</button>
  <div class="error" id="errorMsg">Incorrect password. Try again.</div>
  <div class="footer-text">Authorized users only.</div>
</div>

<script>
function checkPassword() {
  var pw = document.getElementById('pwInput').value;
  var correct = 'layback2026';
  if (pw === correct) {
    sessionStorage.setItem('layback_auth', 'true');
    window.location.href = 'index.html';
  } else {
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>
</body>
</html>
